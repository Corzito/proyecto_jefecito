{% extends 'base.html' %}

{% block title %}Eliminar Colaborador{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-danger text-white py-3">
      <h5 class="mb-0 fw-bold"><i class="fas fa-trash me-2"></i>Confirmar Eliminación</h5>
    </div>
    <div class="card-body p-4 text-center">
      <i class="fas fa-exclamation-triangle text-warning fa-3x mb-3"></i>
      <p class="fs-5">¿Estás seguro de eliminar a:</p>
      <p class="fw-bold fs-4">{{ colaborador.nombres }}</p>
      <p class="text-muted">{{ colaborador.cedula }} | {{ colaborador.empresa }}</p>
      <div class="d-flex gap-2 justify-content-center mt-4">
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="fas fa-trash me-1"></i>Sí, eliminar
          </button>
        </form>
        <a href="{% url 'periodo:lista' %}" class="btn btn-outline-secondary px-4">
          <i class="fas fa-times me-1"></i>Cancelar
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
